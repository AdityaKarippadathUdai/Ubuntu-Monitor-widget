<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
    }

    .widget {
    width: 100%;
    height: 100%;
    box-sizing: border-box; /* 🔥 prevents overflow */

    padding: 15px;
    border-radius: 16px;

    background: rgba(10, 10, 10, 0.5);
    backdrop-filter: blur(12px);

    color: white;
    }

    .title {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 14px;
    }

    .value {
      font-weight: bold;
    }
    body {
    margin: 0;
    overflow: hidden;  /* 🔥 IMPORTANT */
    }
    .bar {
      height: 6px;
      border-radius: 5px;
      background: rgba(255,255,255,0.1);
      margin-top: 4px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: width 0.5s ease;
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="title">SYSTEM</div>
    <div class="stat">
    <span>BAT</span>
    <span class="value" id="batteryText">0%</span>
    </div>
    <div class="bar"><div id="batteryBar" class="fill"></div></div>
    <div class="stat">
      <span>CPU</span>
      <span class="value" id="cpuText">0%</span>
    </div>
    <div class="bar"><div id="cpuBar" class="fill"></div></div>

    <div class="stat">
      <span>RAM</span>
      <span class="value" id="ramText">0%</span>
    </div>
    <div class="bar"><div id="ramBar" class="fill"></div></div>

<div class="stat">
  <span>GPU</span>
  <span class="value" id="gpuText">0%</span>
</div>
<div class="bar"><div id="gpuBar" class="fill"></div></div>

<div class="stat">
  <span>VRAM</span>
  <span class="value" id="vramText">0%</span>
</div>
<div class="bar"><div id="vramBar" class="fill"></div></div>

  <script src="./renderer.js"></script>
</body>
</html>
